version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ai-nexus-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: ai-nexus
    volumes:
      - mongo_data:/data/db
    networks:
      - ai-nexus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-nexus-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:secret@mongo:27017/ai-nexus?authSource=admin
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - ai-nexus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-nexus-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - ai-nexus-net

volumes:
  mongo_data:

networks:
  ai-nexus-net:
    driver: bridge
