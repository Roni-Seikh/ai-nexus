name: Deploy AI Nexus

on:
  push:
    branches: [main]

jobs:
  build-and-check:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backend syntax
        run: |
          cd backend
          npm install
          node --check server.js
          echo "✅ Backend OK"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          VITE_API_URL: https://ai-nexus-backend-kadk.onrender.com/api
          VITE_SOCKET_URL: https://ai-nexus-backend-kadk.onrender.com

      - name: Deploy success notification
        run: |
          echo "✅ Build passed!"
          echo "🚀 Render auto-deploys when you push to main"
          echo "🚀 Vercel auto-deploys when you push to main"
          echo "No manual steps needed - just push code!"
